<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲計時器</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<link rel="stylesheet" href="css/html.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:rgba(255,255,255,0.95);
    padding:36px 40px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    width:90%;
    max-width:550px;
}

.icon{
    font-size:44px;
    margin-bottom:12px;
}

h1{
    color:#333;
    margin-bottom:8px;
}

p{
    color:#666;
    margin-bottom:20px;
}

.time-inputs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.time-inputs input{
    width:90px;
    padding:12px;
    border:2px solid #667eea;
    border-radius:12px;
    text-align:center;
    font-size:16px;
}

button {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 18px 40px;
    font-size: 1.2em;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(
        0.175, 0.885, 0.32, 1.275
    );
    box-shadow: 0 8px 20px rgba(
        102, 126, 234, 0.3
    );
    font-weight: 600;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.2),
        transparent
    );
    transition: left 0.6s;
}

button:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(
        102, 126, 234, 0.4
    );
}

button:hover::before {
    left: 100%;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(102,126,234,0.4);
}

.countdown-box{
    margin-top:30px;
}

.countdown-number{
    font-size:48px;
    font-weight:bold;
    color:#667eea;
}

.countdown-text{
    color:#999;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

    <div class="icon">🎮</div>

    <h1>遊戲計時器</h1>

    <p>請輸入時間</p>

    <div class="time-inputs">
        <input type="number" id="hoursInput" placeholder="時">
        <input type="number" id="minutesInput" placeholder="分">
        <input type="number" id="secondsInput" placeholder="秒">
    </div>

    <div class="buttons">
        <button onclick="startTimer()">開始</button>

        <button id="pauseBtn" onclick="pauseTimer()">
            暫停
        </button>

        <button onclick="resetTimer()">重設</button>
    </div>

    <div class="countdown-box">
        <div class="countdown-number" id="countdown">
            00:00:00
        </div>

        <div class="countdown-text">
            剩餘時間
        </div>
    </div>

</div>

<script>
let totalSeconds = 0;
let timer = null;
let isPaused = false;

function updateDisplay() {

    let hours = Math.floor(totalSeconds / 3600);
    let minutes = Math.floor((totalSeconds % 3600) / 60);
    let seconds = totalSeconds % 60;

    document.getElementById("countdown").innerText =
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");
}

function countdown() {

    totalSeconds--;

    updateDisplay();

    if (totalSeconds <= 0) {

        clearInterval(timer);

        totalSeconds = 0;

        updateDisplay();

        const sound = new Audio("time_end.wav");

        sound.play();

        sound.onended = function() {
            setTimeout(() => {
                window.location.href = "time_end.html";
            }, 1000);
        };
    }
}

function startTimer() {

    if (isPaused && totalSeconds > 0) {

        isPaused = false;

        timer = setInterval(countdown, 1000);

        return;
    }

    let hours =
        parseInt(document.getElementById("hoursInput").value) || 0;

    let minutes =
        parseInt(document.getElementById("minutesInput").value) || 0;

    let seconds =
        parseInt(document.getElementById("secondsInput").value) || 0;

    totalSeconds =
        hours * 3600 +
        minutes * 60 +
        seconds;

    if (totalSeconds <= 0) {

        alert("請輸入時間！");
        return;
    }

    clearInterval(timer);

    isPaused = false;

    updateDisplay();

    timer = setInterval(countdown, 1000);
}

function pauseTimer() {

    if (timer !== null) {

        clearInterval(timer);

        timer = null;

        isPaused = true;
    }
}

function resetTimer() {

    clearInterval(timer);

    timer = null;

    totalSeconds = 0;

    isPaused = false;

    document.getElementById("hoursInput").value = "";
    document.getElementById("minutesInput").value = "";
    document.getElementById("secondsInput").value = "";

    document.getElementById("countdown").innerText =
        "00:00:00";
}
</script>

</body>
</html>
